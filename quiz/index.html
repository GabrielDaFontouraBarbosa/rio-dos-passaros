<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="./quiz.css">
</head>
<body>    
    <div class="quiz-container"> 
        <div class="quiz-wrapper">
            <span class="timer" id="timer">00:00</span>
            <div class="pergunta">
                <span id="pergunta">Pergunta Pergunta Pergunta?</span>
            </div>
            <div class="secao-respostas">
                <div class="resposta" id="divRA">
                    <div class="alternativa"><span>A</span></div>
                    <div class="texto-resposta"><span id="respostaA">Resposta</span></div>
                </div>
                <div class="resposta" id="divRB">
                    <div class="alternativa"><span>B</span></div>
                    <div class="texto-resposta"><span id="respostaB">Resposta</span></div>
                </div>
                <div class="resposta" id="divRC">
                    <div class="alternativa"><span>C</span></div>
                    <div class="texto-resposta"><span id="respostaC">Resposta</span></div>
                </div>
                <div class="resposta" id="divRD">
                    <div class="alternativa"><span>D</span></div>
                    <div class="texto-resposta"><span id="respostaD">Resposta</span></div>
                </div>
            </div>
        </div>
    </div>
    <script src="./perguntas.js"></script>
    <script src="./quiz.js"></script>
</body>
</html>
